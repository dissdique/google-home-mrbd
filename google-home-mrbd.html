<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Glanceable room-by-room Google Home control for Meta Ray-Ban Display">
<meta name="mrbd-web-app-capable" content="yes">
<meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
<title>Home</title>
<!--
  App icon note: MRBD requires a Unicode symbol or a PNG favicon (>=52x52px), SVG is not
  supported. Swap in a real PNG via <link rel="icon" href="/icon-96.png" sizes="96x96">
  when you have brand art. Left out here since no image asset is provided.
-->
<style>
  :root{
    --bg:#000000;
    --ink:#F5F3EC;
    --ink-dim:#8C8A80;
    --amber:#FFB300;       /* light / focus glow — a literal light metaphor on an additive display */
    --amber-dim:#4A3A12;
    --mint:#7CFFB2;        /* device "on" / unlocked */
    --mint-dim:#274436;
    --coral:#FF6B57;       /* locked / alert */
    --coral-dim:#4A2420;
    --line:#232019;
    --mono: ui-monospace, "SF Mono", "Roboto Mono", Menlo, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 600px; height: 600px;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
  }

  #screen { width: 600px; height: 600px; position: relative; padding: 28px; display:flex; flex-direction:column; }

  /* ---------- header ---------- */
  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 0 0 4px 0;
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 20px 0;
    letter-spacing: -0.01em;
  }

  /* ---------- back pill ---------- */
  .back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
    padding: 10px 18px;
    margin-bottom: 14px;
    border-radius: 999px;
    border: 2px solid var(--line);
    color: var(--ink-dim);
    font-size: 15px;
    min-height: 44px;
  }
  .back:focus, .back.is-focused {
    outline: none;
    border-color: var(--amber);
    color: var(--amber);
    box-shadow: 0 0 18px rgba(255,179,0,0.35);
  }

  /* ---------- grid of cards (rooms / devices) ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    flex: 1;
  }
  .card {
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 88px;
    transition: all 150ms ease;
  }
  .card:focus, .card.is-focused {
    outline: none;
    border-color: var(--amber);
    box-shadow: 0 0 22px rgba(255,179,0,0.4);
  }
  .card .icon { font-size: 30px; line-height: 1; }
  .card .name { font-size: 18px; font-weight: 600; margin-top: 10px; }
  .card .status { font-size: 14px; color: var(--ink-dim); margin-top: 2px; }
  .card.state-on .status { color: var(--mint); }
  .card.state-locked .status { color: var(--mint); }
  .card.state-alert .status { color: var(--coral); }

  /* ---------- glow ring — the signature element: an actual halo of light around anything that is "on" ---------- */
  .glow-ring {
    width: 46px; height: 46px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    background: transparent;
  }
  .glow-ring.lit {
    box-shadow: 0 0 0 2px var(--amber), 0 0 24px 6px rgba(255,179,0,0.55);
    animation: breathe 2.6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 0 2px var(--amber), 0 0 16px 4px rgba(255,179,0,0.4); }
    50%      { box-shadow: 0 0 0 2px var(--amber), 0 0 30px 8px rgba(255,179,0,0.65); }
  }

  /* ---------- detail screen (thermostat) ---------- */
  .detail-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
  .temp-readout {
    font-family: var(--mono);
    font-size: 96px;
    font-weight: 500;
    color: var(--amber);
    letter-spacing: -0.02em;
  }
  .temp-target { font-size: 16px; color: var(--ink-dim); }
  .adjust-hint { font-size: 15px; color: var(--ink-dim); margin-top: 6px; }
  .adjust-box {
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 20px 40px;
  }
  .adjust-box:focus, .adjust-box.is-focused {
    outline: none;
    border-color: var(--amber);
    box-shadow: 0 0 22px rgba(255,179,0,0.4);
  }

  .empty { color: var(--ink-dim); font-size: 16px; }

  @media (prefers-reduced-motion: reduce) {
    .glow-ring.lit { animation: none; box-shadow: 0 0 0 2px var(--amber), 0 0 20px 5px rgba(255,179,0,0.5); }
  }
</style>
</head>
<body>
<div id="screen"></div>

<script>
/* =====================================================================
   DATA LAYER
   In production, replace SIM_DEVICES + HomeClient's fake calls with
   real requests to YOUR backend, which holds the Google Home / Device
   Access OAuth tokens (client-side JS on the glasses can't safely hold
   a refresh token). Your backend would proxy calls like:

     GET  https://smartdevicemanagement.googleapis.com/v1/enterprises/{enterpriseId}/devices
     POST https://smartdevicemanagement.googleapis.com/v1/{deviceId}:executeCommand

   and return simplified JSON in the same shape used below, so only
   this fetch layer needs to change.
   ===================================================================== */

const HomeClient = {
  async fetchRooms() {
    // return fetch('/api/home/rooms').then(r => r.json());
    return structuredClone(SIM_DEVICES);
  },
  async setLight(deviceId, patch) {
    // return fetch(`/api/home/devices/${deviceId}`, { method:'PATCH', body: JSON.stringify(patch) });
    return patch;
  },
  async setLock(deviceId, locked) {
    // return fetch(`/api/home/devices/${deviceId}`, { method:'PATCH', body: JSON.stringify({ locked }) });
    return locked;
  },
  async setThermostat(deviceId, target) {
    // return fetch(`/api/home/devices/${deviceId}`, { method:'PATCH', body: JSON.stringify({ target }) });
    return target;
  }
};

const SIM_DEVICES = {
  rooms: [
    { id: 'living', name: 'Living Room', icon: '🛋️', devices: [
      { id: 'l-ceiling', name: 'Ceiling Lights', type: 'light', on: true, brightness: 70 },
      { id: 'l-lamp',    name: 'Reading Lamp',   type: 'light', on: false, brightness: 40 },
    ]},
    { id: 'bedroom', name: 'Bedroom', icon: '🛏️', devices: [
      { id: 'l-bed',     name: 'Bed Lights',     type: 'light', on: false, brightness: 30 },
      { id: 't-bed',     name: 'Thermostat',     type: 'thermostat', temp: 69, target: 68 },
    ]},
    { id: 'kitchen', name: 'Kitchen', icon: '🍳', devices: [
      { id: 'l-kitchen', name: 'Counter Lights', type: 'light', on: true, brightness: 90 },
    ]},
    { id: 'entry', name: 'Front Door', icon: '🚪', devices: [
      { id: 'lock-front', name: 'Front Lock',    type: 'lock', locked: true },
    ]},
  ]
};

/* =====================================================================
   STATE
   ===================================================================== */

const STORAGE_KEY = 'mrbd-google-home-state';
let DATA = null;               // populated on init from HomeClient + localStorage overlay
let state = { screen: 'rooms', roomId: null };

function loadOverlay() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function saveOverlay() {
  const overlay = {};
  DATA.rooms.forEach(room => room.devices.forEach(d => { overlay[d.id] = d; }));
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(overlay)); } catch (e) {}
}
function applyOverlay(data, overlay) {
  data.rooms.forEach(room => room.devices.forEach(d => {
    if (overlay[d.id]) Object.assign(d, overlay[d.id]);
  }));
  return data;
}

function getRoom(id) { return DATA.rooms.find(r => r.id === id); }
function getDevice(id) {
  for (const room of DATA.rooms) {
    const d = room.devices.find(x => x.id === id);
    if (d) return d;
  }
  return null;
}
function roomStatusLine(room) {
  const on = room.devices.filter(d => d.type === 'light' && d.on).length;
  const totalLights = room.devices.filter(d => d.type === 'light').length;
  const lock = room.devices.find(d => d.type === 'lock');
  const parts = [];
  if (totalLights) parts.push(`${on}/${totalLights} lights on`);
  if (lock) parts.push(lock.locked ? 'Locked' : 'Unlocked');
  const thermo = room.devices.find(d => d.type === 'thermostat');
  if (thermo) parts.push(`${thermo.temp}°`);
  return parts.join(' · ') || 'No devices';
}

/* =====================================================================
   RENDER
   ===================================================================== */

function render() {
  const el = document.getElementById('screen');
  if (state.screen === 'rooms') el.innerHTML = renderRooms();
  else if (state.screen === 'devices') el.innerHTML = renderDevices(getRoom(state.roomId));
  else if (state.screen === 'thermo') el.innerHTML = renderThermo(getDevice(state.deviceId));

  const focusables = el.querySelectorAll('.focusable');
  if (focusables.length) focusables[0].focus();
  bindClicks(el);
}

function renderRooms() {
  const cards = DATA.rooms.map(room => `
    <div class="card focusable" tabindex="0" data-action="open-room" data-id="${room.id}">
      <span class="icon">${room.icon}</span>
      <div>
        <div class="name">${room.name}</div>
        <div class="status">${roomStatusLine(room)}</div>
      </div>
    </div>
  `).join('');

  return `
    <p class="eyebrow">Home</p>
    <h1>Rooms</h1>
    <div class="grid">${cards}</div>
  `;
}

function renderDevices(room) {
  if (!room) return `<p class="empty">Room not found.</p>`;
  const cards = room.devices.map(d => {
    if (d.type === 'light') {
      return `
        <div class="card focusable ${d.on ? 'state-on' : ''}" tabindex="0" data-action="toggle-light" data-id="${d.id}">
          <span class="glow-ring ${d.on ? 'lit' : ''}">💡</span>
          <div>
            <div class="name">${d.name}</div>
            <div class="status">${d.on ? `On · ${d.brightness}%` : 'Off'}</div>
          </div>
        </div>`;
    }
    if (d.type === 'lock') {
      return `
        <div class="card focusable ${d.locked ? 'state-locked' : 'state-alert'}" tabindex="0" data-action="toggle-lock" data-id="${d.id}">
          <span class="icon">${d.locked ? '🔒' : '🔓'}</span>
          <div>
            <div class="name">${d.name}</div>
            <div class="status">${d.locked ? 'Locked' : 'Unlocked'}</div>
          </div>
        </div>`;
    }
    if (d.type === 'thermostat') {
      return `
        <div class="card focusable" tabindex="0" data-action="open-thermo" data-id="${d.id}">
          <span class="icon">🌡️</span>
          <div>
            <div class="name">${d.name}</div>
            <div class="status">${d.temp}° · target ${d.target}°</div>
          </div>
        </div>`;
    }
    return '';
  }).join('');

  return `
    <div class="back focusable" tabindex="0" data-action="back">← Rooms</div>
    <p class="eyebrow">${room.name}</p>
    <h1>Devices</h1>
    <div class="grid">${cards}</div>
  `;
}

function renderThermo(d) {
  if (!d) return `<p class="empty">Device not found.</p>`;
  return `
    <div class="back focusable" tabindex="0" data-action="back">← Devices</div>
    <p class="eyebrow">Thermostat</p>
    <h1>${d.name}</h1>
    <div class="detail-wrap">
      <div class="temp-readout">${d.target}°</div>
      <div class="temp-target">Current ${d.temp}° · Target ${d.target}°</div>
      <div class="adjust-box focusable" tabindex="0" data-action="adjust-thermo" data-id="${d.id}" data-role="adjust">
        Use ◀ / ▶ to set target, ⏎ to confirm
      </div>
    </div>
  `;
}

/* =====================================================================
   INPUT: D-pad / captouch → ArrowUp/Down/Left/Right + Enter
   ===================================================================== */

function moveFocus(direction) {
  const focusables = Array.from(document.querySelectorAll('.focusable'));
  if (!focusables.length) return;
  const idx = focusables.indexOf(document.activeElement);
  if (idx === -1) { focusables[0].focus(); return; }

  let next;
  if (direction === 'up' || direction === 'left') {
    next = idx > 0 ? idx - 1 : focusables.length - 1;
  } else {
    next = idx < focusables.length - 1 ? idx + 1 : 0;
  }
  focusables[next].focus();
}

function adjustThermoTarget(deviceId, delta) {
  const d = getDevice(deviceId);
  if (!d) return;
  d.target = Math.max(50, Math.min(90, d.target + delta));
  saveOverlay();
  const readout = document.querySelector('.temp-readout');
  const target = document.querySelector('.temp-target');
  if (readout) readout.textContent = `${d.target}°`;
  if (target) target.textContent = `Current ${d.temp}° · Target ${d.target}°`;
  HomeClient.setThermostat(deviceId, d.target);
}

function activate(el) {
  const action = el.dataset.action;
  const id = el.dataset.id;

  if (action === 'back') {
    state = { screen: 'rooms', roomId: null };
    render();
    return;
  }
  if (action === 'open-room') {
    state = { screen: 'devices', roomId: id };
    render();
    return;
  }
  if (action === 'toggle-light') {
    const d = getDevice(id);
    d.on = !d.on;
    saveOverlay();
    HomeClient.setLight(id, { on: d.on });
    render();
    return;
  }
  if (action === 'toggle-lock') {
    const d = getDevice(id);
    d.locked = !d.locked;
    saveOverlay();
    HomeClient.setLock(id, d.locked);
    render();
    return;
  }
  if (action === 'open-thermo') {
    state = { screen: 'thermo', roomId: state.roomId, deviceId: id };
    render();
    return;
  }
  if (action === 'adjust-thermo') {
    // Enter on the adjust control just confirms and returns to the device list.
    state = { screen: 'devices', roomId: state.roomId };
    render();
    return;
  }
}

document.addEventListener('keydown', (e) => {
  const active = document.activeElement;
  const isAdjust = active && active.dataset && active.dataset.role === 'adjust';

  switch (e.key) {
    case 'ArrowUp':
      if (!isAdjust) moveFocus('up');
      break;
    case 'ArrowDown':
      if (!isAdjust) moveFocus('down');
      break;
    case 'ArrowLeft':
      if (isAdjust) adjustThermoTarget(active.dataset.id, -1);
      else moveFocus('left');
      break;
    case 'ArrowRight':
      if (isAdjust) adjustThermoTarget(active.dataset.id, 1);
      else moveFocus('right');
      break;
    case 'Enter':
      if (active && active.classList.contains('focusable')) activate(active);
      break;
    default:
      return;
  }
  e.preventDefault();
});

function bindClicks(root) {
  // Lets this also be tested by mouse/touch in a desktop browser during dev.
  root.querySelectorAll('.focusable').forEach(el => {
    el.addEventListener('click', () => activate(el));
  });
}

/* =====================================================================
   INIT
   ===================================================================== */

(async function init() {
  const fresh = await HomeClient.fetchRooms();
  DATA = applyOverlay(fresh, loadOverlay());
  render();
})();
</script>
</body>
</html>
